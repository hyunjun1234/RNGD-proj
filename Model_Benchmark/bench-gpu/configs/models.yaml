# 모델 매트릭스 (NVIDIA GPU / vLLM). enabled:false는 SKIP.
# id는 Hugging Face 모델 id (RNGD prebuilt 아티팩트가 아닌 원본 HF 모델).
# 하드웨어: RTX A6000 48GB ×3. GPU 0·1은 타작업 점유 → 비어 있는 GPU 2 사용(cuda_visible_devices).
# 측정 대상: RNGD 벤치와 동일 모델로 비교 — Qwen2.5-0.5B·Llama-3.1-8B만 enabled.
# gated 모델(meta-llama/*)은 HF_TOKEN 필요.

models:
  - id: Qwen/Qwen2.5-0.5B-Instruct
    revision: null
    role: smoke           # NPU(RNGD) 측과 role 통일 — furiosa-llm artifact가 4K bucket이라 smoke 용도
    gen: true
    enabled: true
    # NPU max_executable_length=4096과 동일하게 vLLM도 4K context로 맞춤.
    serve_args: ["--port", "8001", "--max-model-len", "4096"]

  - id: meta-llama/Llama-3.1-8B-Instruct
    revision: null
    role: baseline
    gen: true
    enabled: true         # gated — `hf auth login` 필요
    # NPU README "Maximum Context Length: 32k"와 일치.
    # llama3_json tool parser는 NPU(furiosa-llm) 서버 인자와 동일 — 함수 호출 응답 포맷 통일.
    serve_args: ["--max-model-len", "32768", "--tool-call-parser", "llama3_json"]

  - id: Qwen/Qwen3-32B
    revision: null
    role: main
    gen: true
    enabled: false        # 보류. bf16 ~64GB > A6000 48GB 1장 → 켜려면 FP8(--quantization fp8) 또는 TP=2
    serve_args: []

  - id: meta-llama/Llama-3.3-70B-Instruct
    revision: null
    role: large
    gen: true
    enabled: false        # bf16 ~140GB > 96GB → 켜려면 FP8 양자화 필요(아래 serve_args)
    serve_args: ["--quantization", "fp8"]

  - id: LGAI-EXAONE/EXAONE-4.0-32B
    revision: null
    role: main
    gen: true
    enabled: false        # 모델 id·라이선스 확인 후 enable. 커스텀 코드면 trust-remote-code.
    serve_args: ["--trust-remote-code"]

  # ---- retrieval helpers ----
  - id: Qwen/Qwen3-Embedding-8B
    revision: null
    role: embedding
    gen: false
    enabled: false        # 보류. vLLM 0.21은 --task 삭제 → 켤 때 아래 --runner pooling 그대로 사용
    serve_args: ["--runner", "pooling"]

  - id: Qwen/Qwen3-Reranker-8B
    revision: null
    role: reranker
    gen: false
    enabled: false        # 보류. vLLM 0.21은 --task 삭제 → 켤 때 --runner pooling + --hf-overrides + jinja 템플릿 필요
    serve_args: ["--task", "score"]

# 모든 모델 공통 vllm serve 인자
common_serve_args:
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
  - "--enable-prefix-caching"   # NPU(furiosa-llm)와 동일하게 명시. vLLM 기본도 ON이지만 비교 정합성을 위해 명시.

# 사용할 GPU (CUDA_VISIBLE_DEVICES). GPU 0·1은 타작업 점유 → 비어 있는 GPU 2 사용.
# 다중 GPU면 "1,2" + 모델 serve_args에 ["--tensor-parallel-size","2"] 추가.
cuda_visible_devices: "2"

# Request shape sweep (tps/sweep 태스크)
sweep:
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128]
  prompt_lens: [256, 1024, 4096]
  max_tokens: 256
  warmup_requests: 5
  measured_requests: 50

# Memsweep — vllm serve 옵션 OFAT 스윕 (baseline에서 한 축씩 변경, 조합마다 서버 재기동)
# NPU(furiosa-llm) memsweep 8 combo와 직접 비교 가능하도록 축·값을 정렬.
#   NPU max_batch_size           ↔ vLLM --max-num-seqs
#   NPU max_num_batched_tokens   ↔ vLLM --max-num-batched-tokens (동일 키)
# gpu_memory_utilization은 NPU 등가 옵션이 없어 직접 비교용에서는 제외.
# (GPU 단독 메모리 튜닝이 필요하면 별도 yaml로 분리하면 됨.)
memsweep:
  baseline: {}
  axes:
    max_model_len: [4096, 8192, 16384]
    max_num_seqs: [8, 32]
    max_num_batched_tokens: [4096, 16384]
